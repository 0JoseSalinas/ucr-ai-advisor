<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCRAIA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <div class="banner">
      <img src="/ucr.png" alt="UC Riverside campus banner">
      <div class="banner-overlay">
        <h1>UCR AI Advisor</h1>
        <p>Ask academic questions and get AI-powered support</p>
      </div>
    </div>

    <p class="prompt-text">Ask a question about classes, majors, or campus life.</p>

    <form id="questionForm">
      <textarea id="questionInput" placeholder="Type your question here..." required></textarea>
      <button type="submit" id="submitBtn">Submit</button>
    </form>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Thinking...</p>
    </div>

    <h2>Recent Answers</h2>
    <div id="questionsList"></div>

  </div>

  <script src="/script.js"></script>
</body>
</html>
